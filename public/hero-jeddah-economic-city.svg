      <stop offset="0.38" stop-color="#cfdce2"/>
      <stop offset="0.72" stop-color="#80919f"/>
      <stop offset="1" stop-color="#f5dca4"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
