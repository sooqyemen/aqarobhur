<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8ead1"/>
      <stop offset="0.42" stop-color="#eef3f5"/>
      <stop offset="1" stop-color="#d7e3e8"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="0">
